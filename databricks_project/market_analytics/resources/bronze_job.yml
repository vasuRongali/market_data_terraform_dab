resources:
  jobs:
    bronze_ingestion:
      name: bronze-ingestion

      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: ingest
          environment_key: default
          spark_python_task:
            python_file: ../src/bronze/bronze_ingestion.py
            parameters:
              - "--process_name=dailyPricingSourceIngest"
              - "--source_base_url=https://retailpricing.blob.core.windows.net/"
              - "--source_folder=daily-pricing/"
              - "--sink_storage_account=${var.storage_account_name}"
              - "--sink_layer_name=bronze"
              - "--sink_folder_name=daily-pricing-bronze"
        - task_key: transform_daily_pricing_silver
          environment_key: default
          depends_on:
            - task_key: ingest # waits for bronze to finish first
          spark_python_task:
            python_file: ../src/silver/transform_daily_pricing.py
            parameters:
              - "--catalog=silver"
        - task_key: transform_dimensions_gold
          environment_key: default
          depends_on:
            - task_key: transform_daily_pricing_silver # waits for silver to finish first
          spark_python_task:
            python_file: ../src/gold/transform_dimensions.py
            parameters:
              - "--catalog=gold"

        - task_key: transform_date_dim
          environment_key: default
          depends_on:
            - task_key: transform_daily_pricing_silver # waits for silver to finish first
          spark_python_task:
            python_file: ../src/gold/transform_date.py
            parameters:
              - "--catalog=gold"

        - task_key: transform_fact_pricing_gold
          environment_key: default
          depends_on:
            - task_key: transform_date_dim
            - task_key: transform_dimensions_gold # waits for silver to finish first
          spark_python_task:
            python_file: ../src/gold/transform_fact.py
            parameters:
              - "--catalog=gold"
